<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://kvrwymmsgwstvyqmscuy.supabase.co https://api.spotify.com; img-src 'self' data: https://i.scdn.co; style-src 'self' 'unsafe-inline';">
  <title>Comparaison - Spotify Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --spotify-green:#1ED760;
      --bg-main:#0b0b0b;
      --bg-elevated:#181818;
      --text-main:#FFFFFF;
      --text-secondary:#A7A7A7;
      --border-subtle:rgba(255,255,255,0.08);
      --radius-lg:16px;
      --radius-full:999px;
      --font-stack:'Circular',-apple-system,sans-serif;
    }
    body{
      font-family:var(--font-stack);
      background:var(--bg-main);
      color:var(--text-main);
      margin:0;
      padding:30px;
    }
    .container{max-width:1200px;margin:0 auto;}
    h1{text-align:center;color:var(--spotify-green);margin-bottom:30px;}
    .filters{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }
    .filters input{
      background:var(--bg-elevated);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:10px;
      color:var(--text-main);
      font-size:1rem;
      width:200px;
    }
    .filters input::placeholder{color:var(--text-secondary);}
    .back-btn{
      display:block;
      text-align:center;
      margin-bottom:20px;
      text-decoration:none;
      color:var(--text-secondary);
      font-size:0.9rem;
    }
    .back-btn:hover{color:var(--spotify-green);}
    .chart-container{
      background:var(--bg-elevated);
      border-radius:var(--radius-lg);
      border:1px solid var(--border-subtle);
      padding:20px;
    }
    .chart-container h2{margin-top:0;text-align:center;}
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-btn">← Retour à l'accueil</a>
  <h1>Comparaison des écoutes entre amis</h1>
  <div class="filters">
    <input type="text" id="artist-filter" placeholder="Filtrer par artiste" list="artist-list">
    <datalist id="artist-list"></datalist>
    <input type="text" id="title-filter" placeholder="Filtrer par titre" list="title-list">
    <datalist id="title-list"></datalist>
  </div>
  <div class="chart-container">
    <h2>Évolution des streams cumulés</h2>
    <canvas id="comparisonChart"></canvas>
  </div>
</div>

<script>
  // --- CONFIG SUPABASE ---
  const SUPABASE_URL = 'https://kvrwymmsgwstvyqmscuy.supabase.co';
  const SUPABASE_KEY = localStorage.getItem('supabase_anon_key');
  if (!SUPABASE_KEY) {
    console.error("Supabase clé non trouvée : définis 'supabase_anon_key' dans le localStorage ou utilise un backend sécurisé");
  }
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function sanitizeHTML(value) {
    const tmp = document.createElement('div');
    tmp.textContent = value;
    return tmp.innerHTML;
  }

  let chartInstance = null;

  // Couleurs distinctes pour les utilisateurs
  const colors = [
    '#1DB954', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4',
    '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE'
  ];

  // Fonctions pour autocomplétion
  async function updateArtistSuggestions(value) {
    if (!value) return;
    const { data } = await sb.from('artists').select('name').ilike('name', `${value}%`).limit(10);
    const datalist = document.getElementById('artist-list');
    datalist.innerHTML = '';
    data.forEach(item => {
      const option = document.createElement('option');
      option.value = item.name;
      datalist.appendChild(option);
    });
  }

  async function updateTitleSuggestions(value) {
    if (!value) return;
    const { data } = await sb.from('tracks').select('name').ilike('name', `${value}%`).limit(10);
    const datalist = document.getElementById('title-list');
    datalist.innerHTML = '';
    data.forEach(item => {
      const option = document.createElement('option');
      option.value = item.name;
      datalist.appendChild(option);
    });
  }

  // Charger les données par défaut
  loadData();

  // Écouteurs pour les filtres
  document.getElementById('artist-filter').addEventListener('input', (e) => {
    updateArtistSuggestions(e.target.value);
    loadData();
  });
  document.getElementById('title-filter').addEventListener('input', (e) => {
    updateTitleSuggestions(e.target.value);
    loadData();
  });

  async function loadData() {
    const artistFilter = document.getElementById('artist-filter').value.trim();
    const titleFilter = document.getElementById('title-filter').value.trim();

    let query = sb.from('listening_history').select('played_at, user_id, users(display_name)');

    if (artistFilter) {
      // Jointure pour filtrer par artiste
      query = sb.from('listening_history')
        .select('played_at, user_id, users(display_name), tracks!inner(artists!inner(name))')
        .ilike('tracks.artists.name', `%${artistFilter}%`);
    } else if (titleFilter) {
      // Jointure pour filtrer par titre
      query = sb.from('listening_history')
        .select('played_at, user_id, users(display_name), tracks!inner(name)')
        .ilike('tracks.name', `%${titleFilter}%`);
    }

    query = query.order('played_at', { ascending: true });

    const { data, error } = await query;

    if (error) {
      console.error('Error loading data:', error);
      return;
    }

    if (!data || !data.length) {
      console.log('No data');
      return;
    }

    processAndRender(data);
  }

  function processAndRender(data) {
    // Grouper par display_name (ou user_id si pas disponible)
    const users = {};
    data.forEach(play => {
      const maybeName = play.users?.display_name || play.user_id;
      const userName = sanitizeHTML(maybeName);
      if (!users[userName]) users[userName] = {};
      const date = new Date(play.played_at).toISOString().split('T')[0];
      users[userName][date] = (users[userName][date] || 0) + 1;
    });

    // Toutes les dates
    const allDates = new Set();
    Object.values(users).forEach(userPlays => {
      Object.keys(userPlays).forEach(date => allDates.add(date));
    });
    const sortedDates = Array.from(allDates).sort();

    // Calcul cumulatif pour chaque user
    const datasets = [];
    const userNames = Object.keys(users);
    userNames.forEach((userName, index) => {
      const userPlays = users[userName];
      let cum = 0;
      const cumData = [];
      sortedDates.forEach(date => {
        cum += userPlays[date] || 0;
        cumData.push(cum);
      });
      datasets.push({
        label: userName,
        data: cumData,
        borderColor: colors[index % colors.length],
        backgroundColor: colors[index % colors.length] + '20',  // Transparence
        fill: false,
        tension: 0.1
      });
    });

    // Labels formatées
    const labels = sortedDates.map(date => new Date(date).toLocaleDateString('fr-FR'));

    renderChart(labels, datasets);
  }

  function renderChart(labels, datasets) {
    const ctx = document.getElementById('comparisonChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          x: { title: { display: true, text: 'Date' } },
          y: { title: { display: true, text: 'Streams cumulés' }, beginAtZero: true }
        }
      }
    });
  }
</script>
</body>
</html></content
