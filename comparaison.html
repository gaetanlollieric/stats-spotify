<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Comparaison - Spotify Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --spotify-green:#1ED760;
      --bg-main:#0b0b0b;
      --bg-elevated:#181818;
      --text-main:#FFFFFF;
      --text-secondary:#A7A7A7;
      --border-subtle:rgba(255,255,255,0.08);
      --radius-lg:16px;
      --radius-full:999px;
      --font-stack:'Circular',-apple-system,sans-serif;
    }
    body{
      font-family:var(--font-stack);
      background:var(--bg-main);
      color:var(--text-main);
      margin:0;
      padding:30px;
    }
    .container{max-width:1200px;margin:0 auto;}
    h1{text-align:center;color:var(--spotify-green);margin-bottom:30px;}
    .filters{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }
    .filters input{
      background:var(--bg-elevated);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:10px;
      color:var(--text-main);
      font-size:1rem;
      width:200px;
    }
    .filters input::placeholder{color:var(--text-secondary);}
    .chart-container{
      background:var(--bg-elevated);
      border-radius:var(--radius-lg);
      border:1px solid var(--border-subtle);
      padding:20px;
    }
    .chart-container h2{margin-top:0;text-align:center;}
  </style>
</head>
<body>
<div class="container">
  <h1>Comparaison des écoutes entre amis</h1>
  <div class="filters">
    <input type="text" id="artist-filter" placeholder="Filtrer par artiste">
    <input type="text" id="title-filter" placeholder="Filtrer par titre">
  </div>
  <div class="chart-container">
    <h2>Évolution des streams cumulés</h2>
    <canvas id="comparisonChart"></canvas>
  </div>
</div>

<script>
  // --- CONFIG SUPABASE ---
  const SUPABASE_URL = 'https://kvrwymmsgwstvyqmscuy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cnd5bW1zZ3dzdHZ5cW1zY3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3NjAxODksImV4cCI6MjA3OTMzNjE4OX0.XNJOD5MzOaM8u_tRuvXZvx2Q_mHUTbk-mAbUFnoU3H4';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let chartInstance = null;

  // Couleurs distinctes pour les utilisateurs
  const colors = [
    '#1DB954', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4',
    '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE'
  ];

  // Charger les données par défaut
  loadData();

  // Écouteurs pour les filtres
  document.getElementById('artist-filter').addEventListener('input', loadData);
  document.getElementById('title-filter').addEventListener('input', loadData);

  async function loadData() {
    const artistFilter = document.getElementById('artist-filter').value.trim();
    const titleFilter = document.getElementById('title-filter').value.trim();

    let query = sb.from('listening_history').select('played_at, user_id');

    if (artistFilter) {
      // Jointure pour filtrer par artiste
      query = sb.from('listening_history')
        .select('played_at, user_id, tracks!inner(artists!inner(name))')
        .ilike('tracks.artists.name', `%${artistFilter}%`);
    } else if (titleFilter) {
      // Jointure pour filtrer par titre
      query = sb.from('listening_history')
        .select('played_at, user_id, tracks!inner(name)')
        .ilike('tracks.name', `%${titleFilter}%`);
    }

    query = query.order('played_at', { ascending: true });

    const { data, error } = await query;

    if (error) {
      console.error('Error loading data:', error);
      return;
    }

    if (!data || !data.length) {
      console.log('No data');
      return;
    }

    processAndRender(data);
  }

  function processAndRender(data) {
    // Grouper par user_id
    const users = {};
    data.forEach(play => {
      const userId = play.user_id;
      if (!users[userId]) users[userId] = {};
      const date = new Date(play.played_at).toISOString().split('T')[0];
      users[userId][date] = (users[userId][date] || 0) + 1;
    });

    // Toutes les dates
    const allDates = new Set();
    Object.values(users).forEach(userPlays => {
      Object.keys(userPlays).forEach(date => allDates.add(date));
    });
    const sortedDates = Array.from(allDates).sort();

    // Calcul cumulatif pour chaque user
    const datasets = [];
    const userIds = Object.keys(users);
    userIds.forEach((userId, index) => {
      const userPlays = users[userId];
      let cum = 0;
      const cumData = [];
      sortedDates.forEach(date => {
        cum += userPlays[date] || 0;
        cumData.push(cum);
      });
      datasets.push({
        label: userId,  // Ou nom si disponible
        data: cumData,
        borderColor: colors[index % colors.length],
        backgroundColor: colors[index % colors.length] + '20',  // Transparence
        fill: false,
        tension: 0.1
      });
    });

    // Labels formatées
    const labels = sortedDates.map(date => new Date(date).toLocaleDateString('fr-FR'));

    renderChart(labels, datasets);
  }

  function renderChart(labels, datasets) {
    const ctx = document.getElementById('comparisonChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          x: { title: { display: true, text: 'Date' } },
          y: { title: { display: true, text: 'Streams cumulés' }, beginAtZero: true }
        }
      }
    });
  }
</script>
</body>
