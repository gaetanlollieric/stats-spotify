<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Détail du titre - Spotify Stats</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>
<div class="container">
  <a href="index.html" class="back-btn">← Retour</a>

  <div id="track-main"></div>

  <div class="card" id="stats-card" style="display:none;">
    <h2>📈 Vos stats sur ce titre</h2>
    <div class="stat-row"><span>Écoutes totales</span><span id="stat-count">0</span></div>
    <div class="stat-row"><span>Première écoute</span><span id="stat-first">-</span></div>
    <div class="stat-row"><span>Dernière écoute</span><span id="stat-last">-</span></div>
    <!-- la ligne du % sera ajoutée en JS -->
  </div>

  <div class="card" id="similar-card" style="display:none; margin-top:20px;">
    <h2>🎧 Titres similaires</h2>
    <div id="similar-list"></div>
  </div>

  <div class="chart-container">
    <h2>📈 Évolution des streams cumulés</h2>
    <canvas id="streamsChart"></canvas>
  </div>
</div>

<script>
  // --- CONFIG SUPABASE (identique aux autres pages) ---
  const SUPABASE_URL = 'https://kvrwymmsgwstvyqmscuy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cnd5bW1zZ3dzdHZ5cW1zY3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3NjAxODksImV4cCI6MjA3OTMzNjE4OX0.XNJOD5MzOaM8u_tRuvXZvx2Q_mHUTbk-mAbUFnoU3H4';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const spotifyToken = localStorage.getItem('spotify_token');
  const mySpotifyId = localStorage.getItem('my_spotify_id');

  const params = new URLSearchParams(window.location.search);
  const trackId = params.get('track_id'); // ID Spotify du titre

  if (!spotifyToken || !mySpotifyId || !trackId) {
    document.getElementById('track-main').innerHTML =
      "<p>Impossible de charger ce titre. Retour au dashboard pour se reconnecter.</p>";
  } else {
    loadTrack();
    loadTrackStats();
    loadSimilarTracks();
    loadChartData();
  }

  async function spotifyFetch(url) {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${spotifyToken}` } });
    if (!res.ok) {
      console.warn('Erreur Spotify', res.status, url);
      return null;
    }
    return res.json();
  }

  // --- Infos Spotify du titre ---
  async function loadTrack() {
    const t = await spotifyFetch(`https://api.spotify.com/v1/tracks/${encodeURIComponent(trackId)}`);
    if (!t) {
      document.getElementById('track-main').innerHTML = "<p>Titre introuvable sur Spotify.</p>";
      return;
    }

    const name = t.name;
    const artists = t.artists.map(a => a.name).join(', ');
    const album = t.album?.name || '';
    const cover = t.album?.images?.[0]?.url || '';
    const durationMs = t.duration_ms || 0;
    const preview = t.preview_url;
    const explicit = t.explicit;
    const popularity = t.popularity;
    const marketsCount = (t.available_markets || []).length;

    const mins = Math.floor(durationMs / 60000);
    const secs = Math.floor((durationMs % 60000) / 1000).toString().padStart(2,'0');

    const mainDiv = document.getElementById('track-main');
    mainDiv.innerHTML = `
      <div class="track-header">
        <img src="${cover}" alt="${name}" class="cover">
        <div class="meta">
          <h1>${name}</h1>
          <div class="artist">${artists}</div>
          <div class="album">Album : ${album}</div>
          <div class="info-line">Durée : ${mins}:${secs}</div>
          <div class="info-line">Popularité : ${popularity}/100</div>
          <div class="info-line">Marchés disponibles : ${marketsCount}</div>
          <div class="info-line">Explicit : ${explicit ? 'Oui' : 'Non'}</div>
          <button class="btn-spotify" onclick="playTrack()">▶ Lire sur Spotify</button>
          ${preview
            ? `<audio controls src="${preview}"></audio>`
            : '<div style="margin-top:10px;color:#888;font-size:0.85rem;">Pas de preview disponible</div>'}
        </div>
      </div>
    `;
  }

  // --- Stats perso + % d'écoutes ---
  async function loadTrackStats() {
    // 1. Tous tes plays
    const { count: totalCount } = await sb
      .from('listening_history')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', mySpotifyId);

    // 2. Plays pour ce titre
  const { data, count: trackCount, error } = await sb
    .from('listening_history')
    .select('played_at, tracks!inner(spotify_id)', { count: 'exact' })
    .eq('user_id', mySpotifyId)
    .eq('tracks.spotify_id', trackId)
    .order('played_at', { ascending: true });


    if (error || !data || !data.length) return;

    const first = new Date(data[0].played_at);
    const last = new Date(data[data.length - 1].played_at);
    const percent = totalCount ? ((trackCount / totalCount) * 100).toFixed(2) : 0;

    document.getElementById('stat-count').innerText = `${trackCount} écoutes`;
    document.getElementById('stat-first').innerText = first.toLocaleString('fr-FR');
    document.getElementById('stat-last').innerText = last.toLocaleString('fr-FR');

    const statsCard = document.getElementById('stats-card');
    statsCard.style.display = 'block';

    const extra = document.createElement('div');
    extra.className = 'stat-row';
    extra.innerHTML = `<span>Part de tes écoutes</span><span>${percent} %</span>`;
    statsCard.appendChild(extra);
  }

  // --- Lecture Spotify (ajout à la file d'attente) ---
  async function playTrack() {
    if (!spotifyToken) return alert("Reconnecte-toi d'abord.");
  
    const res = await fetch(
      `https://api.spotify.com/v1/me/player/queue?uri=spotify:track:${encodeURIComponent(trackId)}`,
      { method:'POST', headers:{ Authorization:`Bearer ${spotifyToken}` } }
    );
  
    if (res.status === 204 || res.status === 200) {
      alert("Titre ajouté à la file d'attente de ton appareil Spotify actif.");
    } else if (res.status === 404) {
      alert("Aucun appareil actif détecté. Lance Spotify sur ton téléphone/PC.");
    } else if (res.status === 401) {
      alert("Session expirée, reconnecte-toi.");
    } else {
      alert("Impossible d'ajouter à la file (code " + res.status + ").");
    }
  }


  // --- Titres similaires (API recommandations) ---
  async function loadSimilarTracks() {
    const baseUrl = 'https://api.spotify.com/v1/recommendations';
    const headers = { Authorization: `Bearer ${spotifyToken}` };
  
    // 1️⃣ Tentative avec market FR
    let res = await fetch(
      `${baseUrl}?seed_tracks=${trackId}&limit=10&market=FR`,
      { headers }
    );
  
    // 2️⃣ Fallback sans market
    if (res.status === 404) {
      res = await fetch(
        `${baseUrl}?seed_tracks=${trackId}&limit=10`,
        { headers }
      );
    }
  
    // 3️⃣ Fallback avec artiste
    if (res.status === 404) {
      const track = await spotifyFetch(`https://api.spotify.com/v1/tracks/${trackId}`);
      const artistId = track?.artists?.[0]?.id;
      if (!artistId) return;
  
      res = await fetch(
        `${baseUrl}?seed_artists=${artistId}&limit=10`,
        { headers }
      );
    }
  
    if (!res.ok) {
      console.warn('Reco impossible', res.status);
      return;
    }
  
    const data = await res.json();
    renderSimilarTracks(data.tracks || []);
  }

  function openTrack(id) {
    window.location.href = `track.html?track_id=${encodeURIComponent(id)}`;
  }

  async function queueTrack(uri) {
    if (!spotifyToken) return alert("Session expirée, reconnecte-toi.");
    const res = await fetch(
      `https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,
      { method:'POST', headers:{ Authorization:`Bearer ${spotifyToken}` } }
    );
    if (res.status === 204) {
      alert("Ajouté à ta file d'attente Spotify.");
    } else if (res.status === 404) {
      alert("Aucun appareil actif détecté. Lance Spotify sur un appareil.");
    } else {
      alert("Impossible d'ajouter à la file (code " + res.status + ").");
    }
  }

  // --- Chart data ---
  async function loadChartData() {
    // Personal data from Supabase
    const { data: personalData, error } = await sb
      .from('listening_history')
      .select('played_at')
      .eq('user_id', mySpotifyId)
      .eq('tracks.spotify_id', trackId)
      .order('played_at', { ascending: true });

    if (error) {
      console.error('Error loading personal data:', error);
      return;
    }

    // Aggregate personal plays by date
    const personalPlays = {};
    personalData.forEach(play => {
      const date = new Date(play.played_at).toISOString().split('T')[0];
      personalPlays[date] = (personalPlays[date] || 0) + 1;
    });

    // Fetch friends data from local JSON
    let friendsData = {};
    try {
      const res = await fetch('/friends_data.json');
      if (res.ok) {
        const json = await res.json();
        // Assume json.friends is array of { date: '2023-01-01', plays: 10 }
        json.friends.forEach(friend => {
          const date = friend.date;
          friendsData[date] = (friendsData[date] || 0) + friend.plays;
        });
      }
    } catch (e) {
      console.warn('Friends data not available:', e);
    }

    // Combine dates
    const allDates = new Set([...Object.keys(personalPlays), ...Object.keys(friendsData)]);
    const sortedDates = Array.from(allDates).sort();

    // Cumulative
    let personalCum = 0;
    let friendsCum = 0;
    const personalCumData = [];
    const friendsCumData = [];

    sortedDates.forEach(date => {
      personalCum += personalPlays[date] || 0;
      friendsCum += friendsData[date] || 0;
      personalCumData.push(personalCum);
      friendsCumData.push(friendsCum);
    });

    renderChart(sortedDates, personalCumData, friendsCumData);
  }

  function renderChart(labels, personalData, friendsData) {
    const ctx = document.getElementById('streamsChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Mes streams',
          data: personalData,
          borderColor: '#1ED760',
          backgroundColor: 'rgba(30, 215, 96, 0.1)',
          fill: true,
        }, {
          label: 'Streams amis',
          data: friendsData,
          borderColor: '#A7A7A7',
          backgroundColor: 'rgba(167, 167, 167, 0.1)',
          fill: true,
        }]
      },
      options: {
        responsive: true,
        scales: {
          x: {
            title: {
              display: true,
              text: 'Temps'
            }
          },
          y: {
            title: {
              display: true,
              text: 'Streams cumulés'
            },
            beginAtZero: true
          }
        }
      }
    });
  }
</script>
</body>
</html>
